services:
  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: decp-postgres
    environment:
      POSTGRES_USER: decp
      POSTGRES_PASSWORD: decp_password
      POSTGRES_DB: decp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decp"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0.4-management
    container_name: decp-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Give it 20 seconds before starting to check

  # ─────────────────────────────────────────────────────────────────────────
  # Backend Microservices
  # ─────────────────────────────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: decp-user-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: decp
      SPRING_DATASOURCE_PASSWORD: decp_password
      FIREBASE_SERVICE_ACCOUNT_PATH: file:/app/shared/firebase-service-account.json
      SERVER_PORT: "8081"
    volumes:
      - ./services/shared:/app/shared
    restart: on-failure

  post-service:
    build: ./services/post-service
    container_name: decp-post-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/post_db
      SPRING_DATASOURCE_USERNAME: decp
      SPRING_DATASOURCE_PASSWORD: decp_password
      SPRING_RABBITMQ_HOST: rabbitmq
      USER_SERVICE_URL: http://user-service:8081
      SERVER_PORT: "8082"
    restart: on-failure

  job-service:
    build: ./services/job-service
    container_name: decp-job-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_db
      SPRING_DATASOURCE_USERNAME: decp
      SPRING_DATASOURCE_PASSWORD: decp_password
      SERVER_PORT: "8083"
    restart: on-failure

  event-service:
    build: ./services/event-service
    container_name: decp-event-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_db
      SPRING_DATASOURCE_USERNAME: decp
      SPRING_DATASOURCE_PASSWORD: decp_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_PORT: "8084"
    restart: on-failure

  notification-service:
    build: ./services/notification-service
    container_name: decp-notification-service
    ports:
      - "8085:8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      USER_SERVICE_URL: http://user-service:8081
      FIREBASE_SERVICE_ACCOUNT_PATH: file:/app/shared/firebase-service-account.json
      SERVER_PORT: "8085"
    volumes:
      - ./services/shared:/app/shared
    restart: on-failure

  api-gateway:
    build: ./services/api-gateway
    container_name: decp-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - post-service
      - job-service
      - event-service
      - notification-service
    environment:
      USER_SERVICE_URL: http://user-service:8081
      POST_SERVICE_URL: http://post-service:8082
      JOB_SERVICE_URL: http://job-service:8083
      EVENT_SERVICE_URL: http://event-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      FIREBASE_SERVICE_ACCOUNT_PATH: file:/app/shared/firebase-service-account.json
      SERVER_PORT: "8080"
    volumes:
      - ./services/shared:/app/shared
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_FIREBASE_DATABASE_URL=${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
    container_name: decp-web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    depends_on:
      - api-gateway
    restart: on-failure

volumes:
  postgres_data:
  rabbitmq_data: