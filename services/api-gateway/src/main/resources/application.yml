server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      grpc:
        enabled: false
      routes:
        # User Service
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /$\{segment}

        # Post Service
        - id: post-service
          uri: ${POST_SERVICE_URL:http://post-service:8082}
          predicates:
            - Path=/api/posts/**
          filters:
            - RewritePath=/api/posts/(?<segment>.*), /$\{segment}

        # Job Service
        - id: job-service
          uri: ${JOB_SERVICE_URL:http://job-service:8083}
          predicates:
            - Path=/api/jobs/**
          filters:
            - RewritePath=/api/jobs/(?<segment>.*), /$\{segment}

        # Event Service
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://event-service:8084}
          predicates:
            - Path=/api/events/**
          filters:
            - RewritePath=/api/events/(?<segment>.*), /$\{segment}

        # Notification Service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /$\{segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always