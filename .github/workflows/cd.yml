name: CD

on:
  push:
    branches: [prod]

env:
  GAR: asia-south1-docker.pkg.dev/decp-project/decp-repo
  GKE_CLUSTER: decp-cluster
  GKE_REGION: asia-south1
  GKE_NAMESPACE: decp

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push backend services
        env:
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          for service in api-gateway user-service post-service job-service event-service notification-service; do
            echo "Building decp-$service..."
            docker build \
              -t ${{ env.GAR }}/decp-$service:$SHA \
              -t ${{ env.GAR }}/decp-$service:latest \
              services/$service/
            docker push ${{ env.GAR }}/decp-$service:$SHA
            docker push ${{ env.GAR }}/decp-$service:latest
          done

      - name: Build and push web
        env:
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL='' \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            -t ${{ env.GAR }}/decp-web:$SHA \
            -t ${{ env.GAR }}/decp-web:latest \
            web/
          docker push ${{ env.GAR }}/decp-web:$SHA
          docker push ${{ env.GAR }}/decp-web:latest

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Apply Kubernetes manifests
        run: kubectl apply -f deployment/k8s-gke/ -R

      - name: Update deployment images
        env:
          SHA: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          kubectl set image deployment/api-gateway         api-gateway=${{ env.GAR }}/decp-api-gateway:$SHA         -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/user-service        user-service=${{ env.GAR }}/decp-user-service:$SHA        -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/post-service        post-service=${{ env.GAR }}/decp-post-service:$SHA        -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/job-service         job-service=${{ env.GAR }}/decp-job-service:$SHA         -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/event-service       event-service=${{ env.GAR }}/decp-event-service:$SHA       -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/notification-service notification-service=${{ env.GAR }}/decp-notification-service:$SHA -n ${{ env.GKE_NAMESPACE }}
          kubectl set image deployment/web                 web=${{ env.GAR }}/decp-web:$SHA                 -n ${{ env.GKE_NAMESPACE }}

      - name: Wait for rollout
        run: |
          for svc in api-gateway user-service post-service job-service event-service notification-service web; do
            kubectl rollout status deployment/$svc -n ${{ env.GKE_NAMESPACE }} --timeout=1200s
          done
